name: 21-Quality-Gate
on:
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - run: npm install
      - run: npm run build
        working-directory: node-app

  test:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - run: npm test
        working-directory: node-app

  lint:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - run: npm run lint
        working-directory: node-app